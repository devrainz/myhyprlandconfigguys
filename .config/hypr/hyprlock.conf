source = ~/.cache/wal/colors-hyprlock.conf

# -----------------------------------------------------
# GENERAL SETTINGS
# -----------------------------------------------------
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

# -----------------------------------------------------
# BACKGROUND
# -----------------------------------------------------
background {
    monitor =
    path = /home/rainz/.config/hypr/background.jpg
    blur_passes = 0
    zindex = -2
}

# Dim overlay
shape {
    monitor =
    size = 100%, 100%
    color = rgba(0, 0, 0, 0.70)
    zindex = -1
}

# -----------------------------------------------------
# STATUS BAR (Top Right - Battery)
# -----------------------------------------------------

label {
    monitor =
    text = Playing Media:
    color = $wal_fg
    font_size = 18
    font_family = Manrope Bold
    position = 50, 80
    halign = left
    valign = bottom
    shadow_passes = 1
}

label {
    monitor =
    text = cmd[update:1000] sh -c 'title="$(timeout 0.15 playerctl metadata xesam:title 2>/dev/null || true)"; [ -z "$title" ] && title="$(timeout 0.15 playerctl metadata title 2>/dev/null || true)"; [ -n "$title" ] && printf "%s" "$title" || echo ""'
    color = $wal_fg
    font_size = 16
    font_family = Manrope Media
    position = 50, 45
    halign = left
    valign = bottom
    shadow_passes = 1
}


label {
    monitor =
    text = cmd[update:2000] sh -c 'cap="$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -n1)"; [ -n "$cap" ] && printf "%s%% 󱈏" "$cap" || echo ""'
    color = $wal2
    font_size = 14
    font_family = Manrope Bold
    position = -40, -40
    halign = right
    valign = top
    shadow_passes = 0
}

# -----------------------------------------------------
# HEADER (Top Left - Date & Weather)
# -----------------------------------------------------
label {
    monitor =
    text = cmd[update:1000] sh -c 'date +"%A, %b %d"'
    color = $wal_fg
    font_size = 22
    font_family = Manrope SemiBold
    position = 40, -40
    halign = left
    valign = top
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:10000] sh -c 'cat "$HOME/.cache/hyprlock/weather.txt" 2>/dev/null || echo ""'
    color = $wal7
    font_size = 14
    font_family = Manrope Medium
    position = 40, -85
    halign = left
    valign = top
    shadow_passes = 0
}

# -----------------------------------------------------
# CLOCK (Centered) - INSTANT
# -----------------------------------------------------

# HOURS
label {
    monitor =
    text = cmd[update:1000] sh -c 'printf "%s" "$TIME" | cut -d: -f1'
    color = $wal4
    font_size = 150
    font_family = "SpaceMono Nerd Font"
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 0
}

# MINUTES
label {
    monitor =
    text = cmd[update:1000] sh -c 'printf "%s" "$TIME" | cut -d: -f2'
    color = $wal_fg
    font_size = 150
    font_family = "SpaceMono Nerd Font"
    position = 0, -115
    halign = center
    valign = center
    shadow_passes = 0
}

# -----------------------------------------------------
# INPUT FIELD (Bottom Center)
# -----------------------------------------------------
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    # outline / focus color
    outer_color = $wal4

    # inner background for the input (use bg)
    inner_color = $wal0

    # text colors
    font_color = $wal_fg
    check_color = $wal3
    fail_color = $wal1

    fade_on_empty = false
    placeholder_text = <i>Unlock</i>
    hide_input = false

    rounding = -1

    position = 0, 80
    halign = center
    valign = bottom

    shadow_passes = 0
}
