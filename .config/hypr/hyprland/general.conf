monitor = eDP-1,1920x1080@60,0x0,1,vrr,0
monitor = eDP-1, addreserved, 12,12,12,12

general {
    allow_tearing = true
}

input {
    kb_layout = br
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }

    special_fallthrough = true
    follow_mouse = 1
}

binds {
    scroll_event_delay = 0
}

general {
    gaps_in = 4
    gaps_out = 5
    gaps_workspaces = 15
    border_size = 2

    col.active_border = rgba(FFFFFFFF)
    col.inactive_border = rgba(303030FF)

    resize_on_border = true
    no_focus_fallback = true
    layout = dwindle
    allow_tearing = true
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

decoration {
        rounding = 20
    
        blur {
        enabled = true
        xray = false
        special = false
        new_optimizations = true

        size = 5
        passes = 2

        brightness = 1
        noise = 0.01
        contrast = 1

        popups = false
    }   
    shadow {
        enabled = true
        ignore_window = true
        range = 8
        offset = 0 2
        render_power = 1
        color = rgba(00000033)
    }

    active_opacity = 0.95
    inactive_opacity = 0.90
    fullscreen_opacity = 1
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1

    animation = windows,        1, 3, md3_decel, popin 50%
    animation = windowsIn,      1, 3, md3_decel, popin 50%
    animation = windowsOut,     1, 3, md3_accel, popin 50%

    animation = border,         1, 10, default
    animation = fade,           1, 3, md3_decel

    animation = layersIn,       1, 3, menu_decel, slide
    animation = layersOut,      1, 1.6, menu_accel

    animation = fadeLayersIn,   1, 2, menu_decel
    animation = fadeLayersOut,  1, 0.5, menu_accel

    animation = workspaces,     1, 6, menu_decel, slide

    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

misc {
    vfr = 1
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    allow_session_lock_restore = true
    
    initial_workspace_tracking = false
}

