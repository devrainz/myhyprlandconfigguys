################################
# WINDOW RULES
################################

# ────────────────
# Floating utilities
# ────────────────
windowrule = float on, match:class ^(blueberry\.py)$
windowrule = float on, match:class ^(guifetch)$

# ────────────────
# Audio / Network dialogs
# ────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = size 45% 45%, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$

windowrule = float on, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = size 45% 45%, match:class ^(org\.pulseaudio\.pavucontrol)$
windowrule = center on, match:class ^(org\.pulseaudio\.pavucontrol)$

windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = size 45% 45%, match:class ^(nm-connection-editor)$
windowrule = center on, match:class ^(nm-connection-editor)$

# ────────────────
# Forced tiling
# ────────────────
windowrule = tile on, match:class ^dev\.warp\.Warp$

# ────────────────
# Picture-in-Picture
# ────────────────
windowrule = float on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = keep_aspect_ratio on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = move (monitor_w*0.73) (monitor_h*0.72), match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = size 25% 25%, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = pin on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*

# ────────────────
# File chooser / dialogs
# ────────────────
windowrule = float on, match:title ^(Open File).*
windowrule = center on, match:title ^(Open File).*

windowrule = float on, match:title ^(Select a File).*
windowrule = center on, match:title ^(Select a File).*

windowrule = float on, match:title ^(Choose wallpaper).*
windowrule = center on, match:title ^(Choose wallpaper).*

windowrule = float on, match:title ^(Open Folder).*
windowrule = center on, match:title ^(Open Folder).*

windowrule = float on, match:title ^(Save As).*
windowrule = center on, match:title ^(Save As).*

windowrule = float on, match:title ^(Library).*
windowrule = center on, match:title ^(Library).*

windowrule = float on, match:title ^(File Upload).*
windowrule = center on, match:title ^(File Upload).*

# ────────────────
# Games / tearing
# ────────────────
windowrule = immediate on, match:title .*\.exe
windowrule = immediate on, match:class ^(steam_app)

# ────────────────
# Shadows
# ────────────────
windowrule = no_shadow on, match:float false

# ────────────────
# App-specific floating + sizing
# ────────────────
windowrule = float on, match:class ^(org\.gnome\.clocks)$
windowrule = center on, match:class ^(org\.gnome\.clocks)$
windowrule = size 1280 720, match:class ^(org\.gnome\.clocks)$

windowrule = float on, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$
windowrule = size 800 600, match:class ^(blueman-manager)$

windowrule = float on, match:class ^(org\.Waytrogen\.Waytrogen)$
windowrule = center on, match:class ^(org\.Waytrogen\.Waytrogen)$
windowrule = size 1280 720, match:class ^(org\.Waytrogen\.Waytrogen)$

windowrule = float on, match:class ^(heroic)$
windowrule = center on, match:class ^(heroic)$
windowrule = size 1280 720, match:class ^(heroic)$

# ────────────────
# Steam game exceptions
# ────────────────
windowrule = opacity 1 override 1 override, match:class ^(steam_app)
windowrule = no_blur on, match:class ^(steam_app)


################################
# WORKSPACE RULES
################################
workspace = special:special, gapsout:30


################################
# LAYER RULES
################################

# ────────────────
# Launchers
# ROFI
layerrule = match:namespace rofi, ignore_alpha 0.7
layerrule = match:namespace rofi, animation slide left
layerrule = match:namespace rofi, dim_around on# ────────────────
layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.5, match:namespace launcher
# MAKO
layerrule = match:namespace mako, ignore_alpha 0.7
layerrule = match:namespace mako, animation slide left
layerrule = match:namespace mako, dim_around on# ────────────────
# Wallpaper Rofi rules
layerrule = match:namespace wallpaper-menu, ignore_alpha 0.7
layerrule = match:namespace wallpaper-menu, animation slide up
layerrule = match:namespace wallpaper-menu, dim_around on

# ────────────────
# Notifications
# ────────────────
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.69, match:namespace notifications
layerrule = animation fade, match:namespace notifications

# ────────────────
# Wofi / logout
# ────────────────
layerrule = blur on, match:namespace wofi
layerrule = blur on, match:namespace logout_dialog

# ────────────────
# GTK layer-shell (bars/panels)
# ────────────────
layerrule = blur on, match:namespace gtk-layer-shell
layerrule = ignore_alpha 0, match:namespace gtk-layer-shell

# ────────────────
# Foot dropdown
# ────────────────
layerrule = ignore_alpha 0.9, match:namespace foot

# ────────────────
# AGS animations
# ────────────────
layerrule = animation slide left, match:namespace sideleft.*
layerrule = animation slide right, match:namespace sideright.*

# ────────────────
# AGS blur groups
# ────────────────
layerrule = blur on, match:namespace session[0-9]*
layerrule = blur on, match:namespace bar[0-9]*
layerrule = ignore_alpha 0.6, match:namespace bar[0-9]*

layerrule = blur on, match:namespace barcorner.*
layerrule = ignore_alpha 0.6, match:namespace barcorner.*

layerrule = blur on, match:namespace dock[0-9]*
layerrule = ignore_alpha 0.6, match:namespace dock[0-9]*

layerrule = blur on, match:namespace indicator.*
layerrule = ignore_alpha 0.6, match:namespace indicator.*

layerrule = blur on, match:namespace overview[0-9]*
layerrule = ignore_alpha 0.6, match:namespace overview[0-9]*

layerrule = blur on, match:namespace cheatsheet[0-9]*
layerrule = ignore_alpha 0.6, match:namespace cheatsheet[0-9]*

layerrule = blur on, match:namespace osk[0-9]*
layerrule = ignore_alpha 0.6, match:namespace osk[0-9]*

# ────────────────
# App-specific blur + opacity
# ────────────────
windowrule = opacity 0.8 override 0.75 override, match:class ^(discord)$
layerrule = blur on, match:class discord

layerrule = blur on, match:class steam

windowrule = opacity 0.8 override 0.75 override, match:class ^(org.gnome.Nautilus)$
layerrule = blur on, match:class org.gnome.Nautilus

windowrule = opacity 0.8 override 0.75 override, match:class ^(org.gnome.gThumb)$
layerrule = blur on, match:class org.gnome.gThumb

windowrule = opacity 0.8 override 0.75 override, match:class ^(org\.Waytrogen\.Waytrogen)$
layerrule = blur on, match:class org\.Waytrogen\.Waytrogen

layerrule = animation fade, match:namespace fuzzel

# ────────────────
# Explicit blur disables
# ────────────────
# Disable blur for Waybar
layerrule = blur off, match:namespace waybar
layerrule = blur off, match:namespace rofi
layerrule = blur off, match:namespace swappy
layerrule = blur off, match:namespace hyprpicker
layerrule = blur off, match:class swaync-control-center
layerrule = blur off, match:class swaync-notification
layerrule = ignore_alpha 0.3, match:namespace swaync-control-center
layerrule = ignore_alpha 0.3, match:namespace swaync-notification
# ────────────────
# Animation overrides
# ────────────────
layerrule = animation none, match:namespace hyprpicker

####################
###  QUICKSHELL  ###
####################
# HUB (Control Center + power menu)
layerrule = match:namespace quickshell, animation slide top
layerrule = match:namespace quickshell, dim_around on
layerrule = match:namespace power-menu, animation popin 99%, dim_around on
layerrule = match:namespace wifi-menu, animation slide right, dim_around on
